services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      db:
        condition: service_healthy
  db:
    image: mysql:latest
    environment:
      - MYSQL_DATABASE=maBase
      # - MYSQL_USER=root
      - MYSQL_ROOT_PASSWORD=mypassword
    ports:
      - "3306:3306"
    volumes:
      - ./data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10