global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'spring-boot-app'
    static_configs:
      - targets: ['app:8080']
        labels:
          application: 'MaDemo'
    metrics_path: '/actuator/prometheus'

  - job_name: 'jmeter'
    static_configs:
      - targets: ['jmeter:9270']
        labels:
          application: 'JMeter'
    metrics_path: '/metrics'
    scrape_interval: 5s
